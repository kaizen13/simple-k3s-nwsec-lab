# Sample Application Ingress Configuration
# This file contains both the Ingress resource and the HTTP→HTTPS redirect Middleware
#
# Features:
# - TLS termination with custom certificate
# - Automatic HTTP to HTTPS redirect (308 Permanent Redirect)
# - Traefik ingress controller
#
# Usage:
#   kubectl apply -f ingress-updated.yaml

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sample-app-ingress
  namespace: sample-app
  labels:
    app.kubernetes.io/name: sample-app
    app.kubernetes.io/component: ingress
  annotations:
    # Traefik entrypoints for HTTP and HTTPS
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    # Reference to the redirect middleware (namespace-name@kubernetescrd)
    traefik.ingress.kubernetes.io/router.middlewares: sample-app-redirect-https@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
  - host: demo.jwst.lan
    http:
      paths:
      - backend:
          service:
            name: frontend
            port:
              number: 80
        path: /
        pathType: Prefix
  tls:
  - hosts:
    - demo.jwst.lan
    secretName: demo-lab-local-tls
---
# HTTP to HTTPS Redirect Middleware
# This middleware is referenced by the Ingress above
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: sample-app-redirect-https
  namespace: sample-app
  labels:
    app.kubernetes.io/name: sample-app
    app.kubernetes.io/component: middleware
spec:
  redirectScheme:
    scheme: https
    permanent: true
    port: "443"
