# Sample Application Ingress Configuration
# Uses Traefik IngressRoute CRD for proper middleware support in Traefik v3.x
#
# Features:
# - TLS termination with custom certificate
# - Automatic HTTP to HTTPS redirect (308 Permanent Redirect)
# - Traefik IngressRoute (native CRD)
#
# Usage:
#   kubectl apply -f ingress-updated.yaml

apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sample-app-http
  namespace: sample-app
  labels:
    app.kubernetes.io/name: sample-app
    app.kubernetes.io/component: ingressroute
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`demo.jwst.lan`)
      kind: Rule
      services:
        - name: frontend
          port: 80
      middlewares:
        - name: sample-app-redirect-https
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sample-app-https
  namespace: sample-app
  labels:
    app.kubernetes.io/name: sample-app
    app.kubernetes.io/component: ingressroute
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`demo.jwst.lan`)
      kind: Rule
      services:
        - name: frontend
          port: 80
  tls:
    secretName: demo-lab-local-tls
---
# HTTP to HTTPS Redirect Middleware
# IMPORTANT: For Traefik v3.x, use traefik.io/v1alpha1 API group
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: sample-app-redirect-https
  namespace: sample-app
  labels:
    app.kubernetes.io/name: sample-app
    app.kubernetes.io/component: middleware
spec:
  redirectScheme:
    scheme: https
    permanent: true
    port: "443"
