# Traefik Middleware for HTTP to HTTPS Redirect
# This middleware redirects all HTTP traffic to HTTPS with a 308 Permanent Redirect
#
# IMPORTANT: For Traefik v3.x, use traefik.io/v1alpha1 API group
# The older traefik.containo.us/v1alpha1 is deprecated in Traefik v3+
#
# Usage: Reference in IngressRoute as:
#   middlewares:
#   - name: sample-app-redirect-https
#
# Or in standard Ingress annotations:
#   traefik.ingress.kubernetes.io/router.middlewares: sample-app-redirect-https@kubernetescrd

apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: sample-app-redirect-https
  namespace: sample-app
  labels:
    app.kubernetes.io/name: sample-app
    app.kubernetes.io/component: middleware
spec:
  redirectScheme:
    scheme: https
    permanent: true
    port: "443"
